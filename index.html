    /* 下拉刷新的提示橫幅 */
    #pullToRefresh {
      position: fixed;

      left: 0;
      width: 100%;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #4a9eff;
      font-size: 13px;
      font-weight: bold;

      background-color: rgba(26, 32, 38, 0.9);

    /* 防止 iPhone 原生的網頁回彈效果干擾 */

      overscroll-behavior-y: none; 
    }

      white-space: nowrap;
      font-weight: 500;

    .panel { display: none; }

    }

const STOCK_NAMES = {};
Object.values(SECTORS).flat().forEach(s => STOCK_NAMES[s.code] = s.name);

// ==================== 資料庫狀態 ====================
let stockData = {};
let lastUpdateTime = null;
let currentSector = null;
let stockSortKey = "pct10";
let stockSortDir = -1;

// ==================== 儲存與讀取 ====================
function saveData() {
  try {
    localStorage.setItem("ai_stocks_data", JSON.stringify({
      data: stockData,
      time: lastUpdateTime
    }));
  } catch(e) { console.error("Save error", e); }
}

function loadData() {
  try {
    const raw = localStorage.getItem("ai_stocks_data");
    if (raw) {
      const obj = JSON.parse(raw);
      stockData = obj.data || {};
      lastUpdateTime = obj.time;
      updateUI();
    }
  } catch(e) {}
}

// ==================== FinMind API 抓取邏輯 ====================
async function fetchFinMindData() {
  const token = document.getElementById("apiToken").value.trim();
  const btn = document.getElementById("fetchFinMindBtn");
  const statusEl = document.getElementById("fetchStatus");
  const progContainer = document.getElementById("progressContainer");
  const progBar = document.getElementById("progressBar");
  
  const uniqueCodes = Object.keys(STOCK_NAMES);
  const today = new Date();
  const pastDate = new Date(today);
  pastDate.setDate(pastDate.getDate() - 25);
  const start_date = pastDate.toISOString().split('T')[0];

  btn.disabled = true;
  progContainer.style.display = "block";
  stockData = {}; 
  
  let successCount = 0;
  for (let i = 0; i < uniqueCodes.length; i++) {
    const code = uniqueCodes[i];
    statusEl.textContent = `抓取中: ${code} ${STOCK_NAMES[code]} (${i+1}/${uniqueCodes.length})...`;
    progBar.style.width = `${((i+1) / uniqueCodes.length) * 100}%`;
    
    let url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${code}&start_date=${start_date}`;
    if (token) url += `&token=${token}`;

    try {
      const res = await fetch(url);
      const json = await res.json();
      
      if (json.msg === "success" && json.data.length > 0) {
        const data = json.data;
        const latest = data[data.length - 1]; 
        
        const getClose = (offset) => {
          const index = data.length - 1 - offset;
          return index >= 0 ? data[index].close : latest.close;
        }

        const prev1 = getClose(1);
        const prev5 = getClose(5);
        const prev10 = getClose(10);

        const price = latest.close;
        const pct1 = prev1 ? ((price - prev1) / prev1) * 100 : 0;
        const pct5 = prev5 ? ((price - prev5) / prev5) * 100 : 0;
        const pct10 = prev10 ? ((price - prev10) / prev10) * 100 : 0;
        const vol = latest.Trading_Volume / 1000; 
        const amount = (price * vol) / 10000; 

        stockData[code] = {
          price: price,
          pct1: parseFloat(pct1.toFixed(2)),
          pct5: parseFloat(pct5.toFixed(2)),
          pct10: parseFloat(pct10.toFixed(2)),
          amount: parseFloat(amount.toFixed(2))
        };
        successCount++;
      }
    } catch (e) {
      console.error(`Fetch error for ${code}`, e);
    }

    if (!token) await new Promise(r => setTimeout(r, 300));
  }

  lastUpdateTime = new Date().toISOString();
  saveData();
  updateUI();
  
  statusEl.textContent = `✅ 抓取完成！成功更新 ${successCount} 檔個股。`;
  btn.disabled = false;
  setTimeout(() => { progContainer.style.display = "none"; statusEl.textContent = ""; }, 5000);
}

// ==================== 計算與渲染功能 ====================
function calcSectorStats() {
  const stats = {};
  Object.entries(SECTORS).forEach(([sector, stocks]) => {
    const valid = stocks.filter(s => stockData[s.code]);
    if (valid.length === 0) {
      stats[sector] = null;
      return;
    }
    const sum = (key) => valid.reduce((a, s) => a + (stockData[s.code][key] || 0), 0);
    const avg = (key) => sum(key) / valid.length;
    stats[sector] = {
      pct1: avg("pct1"),
      pct5: avg("pct5"),
      pct10: avg("pct10"),
      amount: sum("amount"),
      count: valid.length,
      total: stocks.length
    };
  });
  return stats;
}

function pctColor(pct) {
  if (pct == null || isNaN(pct)) return "#444";
  if (pct >= 5) return "#d63031";
  if (pct >= 2) return "#ff6b6b";
  if (pct > 0) return "#ff9999";
  if (pct === 0) return "#888";
  if (pct > -2) return "#7fb89a";
  if (pct > -5) return "#4a9d6f";
  return "#2d8659";
}

function pctClass(pct) {
  if (pct == null || isNaN(pct)) return "flat-text";
  if (pct > 0) return "pos-text";
  if (pct < 0) return "neg-text";
  return "flat-text";
}

function fmtPct(pct) {
  if (pct == null || isNaN(pct)) return "-";
  return (pct > 0 ? "+" : "") + pct.toFixed(2) + "%";
}

function renderOverview() {
  const stats = calcSectorStats();
  const grid = document.getElementById("heatmap");
  grid.innerHTML = "";

  const validStats = Object.values(stats).filter(s => s);
  const totalAmount = validStats.reduce((a, s) => a + (s.amount || 0), 0);
  const avg10d = validStats.length ? validStats.reduce((a,s)=>a+s.pct10,0)/validStats.length : 0;
  
  document.getElementById("summaryCards").innerHTML = `
    <div class="summary-card"><div class="label">族群平均10日漲幅</div><div class="value ${pctClass(avg10d)}">${fmtPct(avg10d)}</div><div class="sub">共 ${validStats.length} 個族群</div></div>
    <div class="summary-card"><div class="label">總成交金額</div><div class="value">${(totalAmount).toFixed(0)} 億</div><div class="sub">追蹤族群合計</div></div>
    <div class="summary-card"><div class="label">資料庫覆蓋</div><div class="value">${Object.keys(stockData).length}</div><div class="sub">已匯入個股檔數</div></div>
  `;

  const sorted = Object.entries(stats).filter(([_,s]) => s).sort((a,b) => b[1].pct10 - a[1].pct10);
  if (sorted.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">📊</div><div>尚未匯入資料</div></div>`;
    return;
  }

  sorted.forEach(([sector, s]) => {
    const cell = document.createElement("div");
    cell.className = "sector-cell";
    cell.style.background = pctColor(s.pct10);
    cell.innerHTML = `
      <div class="sector-name">${sector}</div>
      <div class="sector-pct">${fmtPct(s.pct10)}</div>
      <div class="sector-meta">${s.count}/${s.total} 檔 | ${s.amount.toFixed(0)}億</div>
    `;
    cell.onclick = () => { currentSector = sector; switchTab("stocks"); renderStocks(); };
    grid.appendChild(cell);
  });
}

function renderRanking() {
  const stats = calcSectorStats();
  const sortKey = document.getElementById("rankingSort").value;
  const sorted = Object.entries(stats).filter(([_,s]) => s).sort((a,b) => (b[1][sortKey] || 0) - (a[1][sortKey] || 0));
  
  const container = document.getElementById("rankingBars");
  container.innerHTML = "";

  if (sorted.length === 0) return;

  const isPct = sortKey.startsWith("pct");
  const maxAbs = Math.max(...sorted.map(([_,s]) => Math.abs(s[sortKey] || 0)), 1);

  sorted.forEach(([sector, s]) => {
    const val = s[sortKey] || 0;
    const row = document.createElement("div");
    row.className = "bar-row";

    let barWidth = (Math.abs(val) / maxAbs * 100).toFixed(1);
    let barClass = isPct ? (val >= 0 ? "pos" : "neg") : "pos";
    let displayVal = isPct ? fmtPct(val) : val.toFixed(0) + "億";

    row.innerHTML = `
      <div class="bar-name">${sector}</div>
      <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${barWidth}%">${displayVal}</div></div>
      <div class="bar-pct ${pctClass(isPct ? val : 0)}">${s.count}/${s.total}</div>
    `;
    row.onclick = () => { currentSector = sector; switchTab("stocks"); renderStocks(); };
    container.appendChild(row);
  });
}

function renderStocks() {
  const select = document.getElementById("sectorSelect");
  if (select.options.length === 0) {
    select.innerHTML = '<option value="__all__">— 全部族群 —</option>' + Object.keys(SECTORS).map(s => `<option value="${s}">${s}</option>`).join("");
  }
  select.value = currentSector || "__all__";
  document.getElementById("stocksTitle").textContent = currentSector ? currentSector + " 個股" : "全部個股";

  let stocks = currentSector && currentSector !== "__all__" ? SECTORS[currentSector] : Object.values(SECTORS).flat().filter((v,i,a)=>a.findIndex(t=>(t.code === v.code))===i);
  let rows = stocks.map(s => ({...s, ...stockData[s.code]})).filter(s => s.price != null);

  rows.sort((a,b) => stockSortDir * ((b[stockSortKey] ?? -999) - (a[stockSortKey] ?? -999)));

  const tbody = document.getElementById("stocksTbody");
  tbody.innerHTML = rows.map(s => `
    <tr>
      <td>
        <a href="https://tw.tradingview.com/chart/?symbol=TWSE:${s.code}" target="_blank" style="color: #4a9eff; text-decoration: none; font-weight: bold;">
          ${s.code}
        </a>
      </td>
      <td>
        <a href="https://tw.tradingview.com/chart/?symbol=TWSE:${s.code}" target="_blank" style="color: #4a9eff; text-decoration: none; font-weight: bold;">
          ${s.name}
        </a>
      </td>
      <td style="text-align:right">${s.price?.toFixed(2) ?? "-"}</td>
      <td style="text-align:right" class="${pctClass(s.pct1)}">${fmtPct(s.pct1)}</td>
      <td style="text-align:right" class="${pctClass(s.pct5)}">${fmtPct(s.pct5)}</td>
      <td style="text-align:right" class="${pctClass(s.pct10)}">${fmtPct(s.pct10)}</td>
      <td style="text-align:right">${s.amount?.toFixed(1) ?? "-"}</td>
    </tr>
  `).join("");
}

function renderDataPanel() {
  const lines = Object.entries(stockData).map(([code, d]) => {
    return `${code} ${STOCK_NAMES[code] || ""}\t收盤:${d.price}\t當日:${d.pct1}%\t10日:${d.pct10}%\t金額:${d.amount}億`;
  });
  document.getElementById("dataView").value = lines.join("\n") || "（尚無資料）";
  document.getElementById("dbCount").textContent = Object.keys(stockData).length;
}

function updateUI() {
  if (lastUpdateTime) {
    document.getElementById("lastUpdate").textContent = "最後更新：" + new Date(lastUpdateTime).toLocaleString("zh-TW");
  } else {
    document.getElementById("lastUpdate").textContent = "尚未匯入資料";
  }
  renderOverview(); renderRanking(); renderStocks(); renderDataPanel();
}

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === tab));
  if(tab === "overview") renderOverview();
  if(tab === "ranking") renderRanking();
  if(tab === "stocks") renderStocks();
}

// ==================== 事件綁定 ====================
document.querySelectorAll(".tab").forEach(t => t.onclick = () => switchTab(t.dataset.tab));
document.getElementById("rankingSort").onchange = renderRanking;
document.getElementById("stockSort").onchange = (e) => { stockSortKey = e.target.value; stockSortDir = -1; renderStocks(); };
document.getElementById("sectorSelect").onchange = (e) => { currentSector = e.target.value === "__all__" ? null : e.target.value; renderStocks(); };
document.querySelectorAll(".stocks-table th").forEach(th => {
  th.onclick = () => {
    const key = th.dataset.sort;
    if (stockSortKey === key) stockSortDir *= -1;
    else { stockSortKey = key; stockSortDir = -1; }
    renderStocks();
  };
});

document.getElementById("fetchFinMindBtn").onclick = fetchFinMindData;
document.getElementById("clearDataBtn").onclick = () => {
  if (!confirm("確定清空資料？")) return;
  stockData = {}; lastUpdateTime = null; saveData(); updateUI();

// ==================== 下拉刷新 (Pull-to-Refresh) 邏輯 ====================
let startY = 0;
let currentY = 0;
const ptrIndicator = document.getElementById("pullToRefresh");
const pullThreshold = 70; // 下拉超過 70px 就觸發更新
let isRefreshing = false;

document.addEventListener('touchstart', (e) => {
  // 只有在網頁最頂端，且沒有正在更新時，才記錄手指初始位置
  if (window.scrollY === 0 && !isRefreshing) {
    startY = e.touches[0].clientY;
  } else {
    startY = 0;
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (startY === 0 || isRefreshing) return;
  currentY = e.touches[0].clientY;
  const deltaY = currentY - startY;

  // 如果是往下拉
  if (deltaY > 0) {
    ptrIndicator.style.transition = 'none'; // 讓橫幅跟著手指移動
    ptrIndicator.style.top = Math.min(deltaY - 60, 10) + 'px'; 
    
    if (deltaY > pullThreshold) {
      ptrIndicator.textContent = "↻ 鬆開手指即可更新...";
    } else {
      ptrIndicator.textContent = "↓ 下拉以更新最新股價...";
    }
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (startY === 0 || isRefreshing) return;
  const deltaY = currentY - startY;

  ptrIndicator.style.transition = 'top 0.3s'; // 恢復動畫效果
  
  if (deltaY > pullThreshold) {
    // 觸發更新！
    isRefreshing = true;
    ptrIndicator.style.top = '0px';
    ptrIndicator.textContent = "🚀 正在抓取 FinMind 最新資料...";
    
    // 呼叫原本寫好的 FinMind 抓取函數
    fetchFinMindData().then(() => {
      // 抓完後把橫幅收回去
      setTimeout(() => {
        ptrIndicator.style.top = '-60px';
        isRefreshing = false;
      }, 1000); // 稍微停留1秒讓你看見完成
    });
  } else {
    // 拉的距離不夠，直接收回橫幅
    ptrIndicator.style.top = '-60px';
  }
  
  startY = 0;
  currentY = 0;
});

// 啟動載入資料
loadData();
updateUI();
</script>
